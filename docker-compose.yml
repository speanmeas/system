name: spean_meas_hotel

services:

  mongodb:
    build:
      context: .
      dockerfile: server/services/mongodb/Dockerfile
    container_name: mongodb
    env_file:
      - .env
    ports:
      - "27017:27017"
    volumes:
      - ./.database/mongodb/data/db:/data/db
      - ./.database/mongodb/data/configdb:/data/configdb
    restart: unless-stopped


  minio:
    build:
      context: .
      dockerfile: server/services/minio/Dockerfile
    container_name: minio
    env_file:
      - .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.database/minio/data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped



  server:
    build:
      context: .
      dockerfile: server/services/server/Dockerfile
    container_name: server
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped



  client:
    build:
      context: .
      dockerfile: server/services/client/Dockerfile
    container_name: client
    env_file:
      - .env
    ports:
      - "80:80"
    restart: unless-stopped

